<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>Glance Note</title>
  <link rel="manifest" href="manifest.json?v=20260313r2" />
  <style>
    :root { --bg:#000; --fg:#fff; --muted:#9a9a9a; --line:#2b2b2b; }
    html,body { margin:0; padding:0; background:var(--bg); color:var(--fg); font-family: Helvetica, Arial, sans-serif; height:100%; }
    body { display:flex; min-height:100vh; }
    #app { width:100%; display:flex; flex-direction:column; align-items:center; justify-content:space-between; padding:18px 18px calc(24px + env(safe-area-inset-bottom)); box-sizing:border-box; }
    .topbar { width:100%; display:flex; justify-content:space-between; align-items:center; font-size:12px; color:var(--muted); }
    .hidden-meta { display:none !important; }
    .pill { border:1px solid var(--line); border-radius:999px; padding:6px 10px; }
    .center { flex:1; width:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:28px; }
    .logo { font-size:min(28vw, 128px); line-height:0.9; letter-spacing:-0.05em; user-select:none; }
    .crosshair { position:relative; width:min(72vw,320px); height:min(72vw,320px); border:1px solid var(--line); border-radius:50%; }
    .crosshair::before, .crosshair::after { content:""; position:absolute; background:var(--line); }
    .crosshair::before { left:50%; top:0; bottom:0; width:1px; transform:translateX(-0.5px); }
    .crosshair::after { top:50%; left:0; right:0; height:1px; transform:translateY(-0.5px); }
    #dot { position:absolute; width:16px; height:16px; border-radius:50%; background:#fff; left:50%; top:50%; transform:translate(-50%,-50%); opacity:0.9; transition:transform 0.04s linear; }
    .bottom { width:100%; display:flex; flex-direction:column; gap:14px; }
    .stats { display:grid; grid-template-columns:repeat(4, 1fr); gap:8px; font-size:11px; color:var(--muted); }
    .stat { border:1px solid var(--line); padding:10px; border-radius:14px; text-align:center; }
    .label { display:block; font-size:10px; color:#6f6f6f; margin-bottom:4px; }
    .controls { display:grid; grid-template-columns:1fr 1fr; gap:10px; max-width:420px; width:100%; margin:0 auto; }
    button { appearance:none; border:1px solid #fff; background:#000; color:#fff; border-radius:14px; padding:14px 16px; font:inherit; }
    button.secondary { border-color:var(--line); color:var(--muted); }
    button:disabled { opacity:0.45; }
    #recordBtn.recording { background:#fff; color:#000; }
    #msg { min-height:18px; font-size:12px; color:var(--muted); text-align:center; }
    #downloadLink { display:block; margin-top:10px; text-align:center; color:#fff; text-decoration:none; font-size:12px; }
    #downloadLink[hidden] { display:none; }
    #player { width:100%; }
  </style>
</head>
<body>
  <div id="app">
    <div class="topbar hidden-meta">
      <div class="pill" id="swState">SW: idle</div>
      <div class="pill" id="modeState">Camera: off</div>
    </div>

    <div class="center">
      <div class="logo">GN</div>
      <div class="crosshair" aria-hidden="true">
        <div id="dot"></div>
      </div>
      <div id="msg"></div>
    </div>

    <div class="bottom">
      <div class="stats hidden-meta">
        <div class="stat"><span class="label">Pitch</span><span id="pitchVal">--</span></div>
        <div class="stat"><span class="label">Volume</span><span id="volumeVal">--</span></div>
        <div class="stat"><span class="label">Mode</span><span id="blinkVal">sine</span></div>
        <div class="stat"><span class="label">Tone</span><span id="toneVal">sine</span></div>
      </div>
      <div class="controls">
        <button id="startBtn">Start</button>
        <button id="calBtn" class="secondary hidden-meta" disabled>Calibrate</button>
        <button id="recordBtn" class="secondary" disabled>Record</button>
      </div>
      <audio id="player" controls hidden></audio>
      <a id="downloadLink" hidden></a>
      <video id="video" playsinline muted hidden></video>
    </div>
  </div>

  <script type="module" src="app.js?v=20260313r2"></script>
</body>
</html>
